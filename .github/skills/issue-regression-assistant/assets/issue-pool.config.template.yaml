tracker_name: "替换为问题系统名称"
lookup_mode: "browser"

issue_url_template: "https://tracker.example.com/issues/{id}"
search_url: "https://tracker.example.com/issues?query={id}"
api_endpoint_template: ""

auth_requirements:
  - "需要浏览器登录会话"
  - "查询问题单前需要连接 VPN"

access_notes:
  - "替换为团队特有的访问说明"

application:
  app_type: "web"
  working_directory: "."
  start_commands:
    - "npm install"
    - "npm run dev"
  base_urls:
    - "http://localhost:3000"
  feature_flags:
    - "替换为必需的功能开关"
  test_accounts:
    - role: "admin"
      username_hint: "替换为管理员账号"
    - role: "standard-user"
      username_hint: "替换为普通用户账号"

regression:
  required_issue_fields:
    - "标题"
    - "问题描述"
    - "预期结果"
    - "受影响模块"
  adjacent_scope_rules:
    - "先检查直接修复路径"
    - "检查同一页面、接口或服务边界上的相邻流程"
    - "至少检查一个异常路径和一个边界路径"
  automation_commands:
    - "替换为针对性的测试命令"
  evidence_requirements:
    - "最终结果必须包含已执行步骤"
    - "最终结果必须包含失败或阻塞的证据"
    - "最终结果必须区分已验证事实与推断"

report:
  status_values:
    - "Pass"
    - "Fail"
    - "Blocked"
    - "Partial"
  include_sections:
    - "问题单摘要"
    - "回归范围"
    - "执行检查"
    - "证据"
    - "风险与后续动作"